name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JavaScript
        run: node --check app.js

      - name: Prepare static assets
        run: |
          rm -rf .cloudflare-dist
          mkdir -p .cloudflare-dist
          cp index.html styles.css app.js privacy.html terms.html robots.txt sitemap.xml ads.txt _headers _redirects favicon.svg site.webmanifest .cloudflare-dist/
          cp -R tools .cloudflare-dist/

      - name: Ensure Cloudflare custom domains and DNS
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: mic-script-generator
          CF_ZONE_NAME: ko-workspace.com
        run: |
          node <<'NODE'
          const token = process.env.CF_API_TOKEN;
          const accountId = process.env.CF_ACCOUNT_ID;
          const projectName = process.env.CF_PROJECT_NAME;
          const zoneName = process.env.CF_ZONE_NAME;
          const domains = ["ko-workspace.com", "www.ko-workspace.com"];
          const headers = {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          };

          async function cloudflare(url, options = {}) {
            const response = await fetch(url, { headers, ...options });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.success === false) {
              const detail = (payload.errors || []).map((error) => `${error.code || "error"} ${error.message}`).join("; ");
              throw new Error(`${options.method || "GET"} ${url} failed: ${response.status} ${detail}`);
            }
            return payload.result;
          }

          async function main() {
            const domainsUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${projectName}/domains`;
            const existing = await cloudflare(domainsUrl);
            const pageDomains = Array.isArray(existing) ? existing : [];
            const existingNames = new Set(pageDomains.map((domain) => domain.name));
            console.log(JSON.stringify(pageDomains.map((domain) => ({
              name: domain.name,
              status: domain.status,
              zone_tag: domain.zone_tag,
              zone_id: domain.zone_id,
            }))));

            for (const name of domains) {
              if (existingNames.has(name)) {
                console.log(`${name} already attached`);
                continue;
              }
              await cloudflare(domainsUrl, {
                method: "POST",
                body: JSON.stringify({ name }),
              });
              console.log(`${name} attached`);
            }

            try {
              await ensureWwwDns(pageDomains);
            } catch (error) {
              console.warn(`DNS automation skipped: ${error.message}`);
            }
          }

          async function ensureWwwDns(pageDomains) {
            const recordName = `www.${zoneName}`;
            const target = `${projectName}.pages.dev`;
            const pageDomainZoneId = pageDomains
              .map((domain) => domain.zone_tag || domain.zone_id || domain.zoneId)
              .find(Boolean);
            let zone = pageDomainZoneId ? { id: pageDomainZoneId } : null;

            if (!zone) {
              const zones = await cloudflare(`https://api.cloudflare.com/client/v4/zones?name=${encodeURIComponent(zoneName)}`);
              zone = Array.isArray(zones) ? zones[0] : null;
            }

            if (!zone?.id) {
              throw new Error(`Cloudflare zone not found or token cannot read zones: ${zoneName}`);
            }

            const dnsUrl = `https://api.cloudflare.com/client/v4/zones/${zone.id}/dns_records`;
            const records = await cloudflare(`${dnsUrl}?name=${encodeURIComponent(recordName)}`);
            const cname = (Array.isArray(records) ? records : []).find((record) => record.type === "CNAME");
            const payload = {
              type: "CNAME",
              name: recordName,
              content: target,
              ttl: 1,
              proxied: true,
              comment: "Managed by GitHub Actions for ko-workspace Pages",
            };

            if (cname) {
              if (cname.content === target && cname.proxied === true) {
                console.log(`${recordName} DNS already points to ${target}`);
              } else {
                await cloudflare(`${dnsUrl}/${cname.id}`, {
                  method: "PUT",
                  body: JSON.stringify(payload),
                });
                console.log(`${recordName} DNS updated to ${target}`);
              }
            } else {
              const conflicting = (Array.isArray(records) ? records : []).filter((record) => record.type !== "CNAME");
              if (conflicting.length) {
                throw new Error(`${recordName} has non-CNAME DNS records; please remove them before automation can manage www.`);
              }
              await cloudflare(dnsUrl, {
                method: "POST",
                body: JSON.stringify(payload),
              });
              console.log(`${recordName} DNS created to ${target}`);
            }
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .cloudflare-dist --project-name=mic-script-generator --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
