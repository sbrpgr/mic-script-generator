name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JavaScript
        run: node --check app.js

      - name: Prepare static assets
        run: |
          rm -rf .cloudflare-dist
          mkdir -p .cloudflare-dist
          cp index.html styles.css app.js privacy.html terms.html robots.txt sitemap.xml ads.txt _headers _redirects favicon.svg site.webmanifest .cloudflare-dist/
          cp -R tools .cloudflare-dist/

      - name: Ensure Cloudflare custom domains
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: mic-script-generator
        run: |
          node <<'NODE'
          const token = process.env.CF_API_TOKEN;
          const accountId = process.env.CF_ACCOUNT_ID;
          const projectName = process.env.CF_PROJECT_NAME;
          const domains = ["ko-workspace.com", "www.ko-workspace.com"];
          const apiBase = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${projectName}/domains`;
          const headers = {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          };

          async function cloudflare(path = "", options = {}) {
            const response = await fetch(`${apiBase}${path}`, { headers, ...options });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok || payload.success === false) {
              const detail = (payload.errors || []).map((error) => `${error.code || "error"} ${error.message}`).join("; ");
              throw new Error(`${options.method || "GET"} ${path || "/"} failed: ${response.status} ${detail}`);
            }
            return payload.result;
          }

          async function main() {
            const existing = await cloudflare();
            const existingNames = new Set((Array.isArray(existing) ? existing : []).map((domain) => domain.name));

            for (const name of domains) {
              if (existingNames.has(name)) {
                console.log(`${name} already attached`);
                continue;
              }
              await cloudflare("", {
                method: "POST",
                body: JSON.stringify({ name }),
              });
              console.log(`${name} attached`);
            }
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .cloudflare-dist --project-name=mic-script-generator --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
