name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JavaScript
        run: node --check app.js

      - name: Prepare static assets
        run: |
          mkdir -p .cloudflare-dist
          cp index.html styles.css app.js privacy.html terms.html robots.txt sitemap.xml ads.txt _headers favicon.svg site.webmanifest .cloudflare-dist/
          cp -R tools .cloudflare-dist/

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .cloudflare-dist --project-name=mic-script-generator --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
