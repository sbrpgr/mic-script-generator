<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="한국어 음성을 텍스트로 변환하고 일반 대본, 유튜브 영상, 발표문, 회의 요약 형식으로 정리하는 브라우저 기반 음성 텍스트 작성 도구입니다."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#146c5d" />
    <meta name="application-name" content="음성으로 텍스트 쓰기" />
    <meta name="apple-mobile-web-app-title" content="음성으로 텍스트 쓰기" />
    <link rel="canonical" href="https://ko-workspace.com/" />
    <link rel="alternate" hreflang="ko" href="https://ko-workspace.com/" />
    <link rel="alternate" hreflang="x-default" href="https://ko-workspace.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta property="og:site_name" content="음성으로 텍스트 쓰기" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="음성으로 텍스트 쓰기 | 한국어 음성 텍스트 변환" />
    <meta
      property="og:description"
      content="한국어 음성을 텍스트로 받아 적고 대본 형식으로 정리하는 웹 도구입니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ko-workspace.com/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="음성으로 텍스트 쓰기 | 한국어 음성 텍스트 변환" />
    <meta
      name="twitter:description"
      content="한국어 음성을 텍스트로 받아 적고 대본 형식으로 정리하는 웹 도구입니다."
    />
    <title>음성으로 텍스트 쓰기 | 한국어 음성 텍스트 변환</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://ko-workspace.com/#website",
        "name": "음성으로 텍스트 쓰기",
        "alternateName": "한국어 음성 텍스트 변환",
        "url": "https://ko-workspace.com/",
        "inLanguage": "ko-KR",
        "description": "한국어 음성을 텍스트로 변환하고 대본 형식으로 정리하는 브라우저 기반 음성 텍스트 작성 도구입니다.",
        "publisher": {
          "@type": "Organization",
          "name": "음성으로 텍스트 쓰기",
          "url": "https://ko-workspace.com/"
        }
      }
    </script>
  </head>
  <body>
    <div class="site-layout">
      <aside class="ad-slot ad-rail ad-rail-left" data-ad-placement="left-rail" aria-label="광고 영역"></aside>
      <div class="content-column">
        <aside class="ad-slot ad-band ad-band-top" data-ad-placement="top-banner" aria-label="광고 영역"></aside>
        <main class="app-shell">
      <section class="workspace" aria-label="음성으로 텍스트 쓰기">
        <header class="topbar">
          <div class="brand-block">
            <p class="eyebrow">Voice to Text</p>
            <div class="title-row">
              <h1>음성으로 텍스트 쓰기</h1>
              <button
                id="helpBtn"
                class="help-trigger"
                type="button"
                aria-label="사용법 보기"
                title="사용법 보기"
              >
                ?
              </button>
            </div>
          </div>
          <div class="status-group" aria-live="polite">
            <span id="supportStatus" class="status-pill">확인 중</span>
            <span id="recordStatus" class="record-pill">대기</span>
          </div>
        </header>

        <section class="control-strip" aria-label="녹음 제어">
          <button id="startBtn" class="primary-action" type="button">녹음 시작</button>
          <button id="pauseBtn" type="button" disabled>일시정지</button>
          <button id="stopBtn" type="button" disabled>종료</button>
          <button id="clearBtn" type="button">초기화</button>
          <div class="meter" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>

        <section class="editor-grid">
          <article class="panel transcript-panel">
            <div class="panel-heading">
              <div>
                <h2>음성 텍스트</h2>
                <p id="liveMeta">0자 · 00:00</p>
              </div>
              <span id="interimText" class="interim" aria-live="polite"></span>
            </div>
            <textarea
              id="transcriptInput"
              spellcheck="true"
              placeholder="녹음이 시작되면 여기에 말한 내용이 쌓입니다."
            ></textarea>
          </article>

          <aside class="panel settings-panel" aria-label="대본 설정">
            <div class="field">
              <label for="scriptTitle">제목</label>
              <input id="scriptTitle" type="text" placeholder="예: 신제품 소개 영상" />
            </div>

            <div class="field">
              <label for="scriptType">형식</label>
              <select id="scriptType">
                <option value="general">일반 대본</option>
                <option value="youtube">유튜브 영상</option>
                <option value="presentation">발표문</option>
                <option value="meeting">회의 요약</option>
              </select>
            </div>

            <label class="check-row">
              <input id="removeFillers" type="checkbox" checked />
              <span>군더더기 말 정리</span>
            </label>

            <label class="check-row">
              <input id="addSections" type="checkbox" checked />
              <span>문단 제목 추가</span>
            </label>

            <button id="makeScriptBtn" class="primary-action wide" type="button">대본 만들기</button>
          </aside>
        </section>

        <section class="panel output-panel" aria-label="생성된 대본">
          <div class="panel-heading">
            <div>
              <h2>완성 대본</h2>
              <p id="outputMeta">0자</p>
            </div>
            <div class="action-row">
              <button id="copyBtn" type="button">복사</button>
              <button id="downloadBtn" type="button">TXT 저장</button>
            </div>
          </div>
          <textarea
            id="scriptOutput"
            spellcheck="true"
            placeholder="음성 텍스트를 정리한 대본이 여기에 만들어집니다."
          ></textarea>
        </section>

        <footer class="site-footer">
          <a href="/privacy">개인정보처리방침</a>
          <a href="/terms">이용약관</a>
        </footer>
      </section>
        </main>
        <aside class="ad-slot ad-band ad-band-bottom" data-ad-placement="bottom-banner" aria-label="광고 영역"></aside>
      </div>
      <aside class="ad-slot ad-rail ad-rail-right" data-ad-placement="right-rail" aria-label="광고 영역"></aside>
    </div>

    <button id="selectionCopyBtn" class="selection-copy" type="button" hidden>선택 복사</button>

    <dialog id="helpDialog" class="help-dialog" aria-labelledby="helpTitle">
      <article class="help-card">
        <header class="help-header">
          <div>
            <p class="eyebrow">Quick Guide</p>
            <h2 id="helpTitle">사용법</h2>
          </div>
          <button id="helpCloseBtn" class="help-close" type="button" aria-label="닫기" title="닫기">
            ×
          </button>
        </header>
        <ol class="help-steps">
          <li>
            <strong>마이크 권한 허용</strong>
            <span>브라우저 권한 창이 뜨면 허용을 선택합니다.</span>
          </li>
          <li>
            <strong>녹음 시작</strong>
            <span>말한 내용이 음성 텍스트 영역에 쌓입니다.</span>
          </li>
          <li>
            <strong>형식 선택</strong>
            <span>일반 대본, 유튜브 영상, 발표문, 회의 요약 중 선택합니다.</span>
          </li>
          <li>
            <strong>대본 만들기</strong>
            <span>정리된 결과를 복사하거나 TXT 파일로 저장합니다.</span>
          </li>
        </ol>
      </article>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
